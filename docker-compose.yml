services:
  dnsmasq:
    build:
      context: ./dnsmasq
      dockerfile: Dockerfile
    container_name: awg-dnsmasq
    network_mode: service:awg
    depends_on:
      - awg
    restart: unless-stopped
    volumes:
      - ./dnsmasq/dnsmasq.conf:/etc/dnsmasq.conf:ro
      - ./dnsmasq/lists:/etc/dnsmasq.d/lists:ro

  awg:
    build:
      context: ./awg
      dockerfile: Dockerfile
    container_name: awg-core
    restart: unless-stopped
    ports:
      - "5066:5066/udp"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      AWG_INTERFACE: awg0
      AWG_LISTEN_PORT: 5066
      AWG_ADDRESS: 10.80.0.1/16
      AWG_MTU: 1280
      AWG_DNS: 10.80.0.1
      AWG_TABLE: off
      AWG_RATE_LIMIT_MBIT: "15"
      AWG_WHITELIST_RATE_MBIT: "200"
      AWG_UNLIMITED_RATE_MBIT: "1000"
      AWG_JC: "6"
      AWG_JMIN: "50"
      AWG_JMAX: "1000"
      AWG_S1: "68"
      AWG_S2: "149"
      AWG_S3: "64"
      AWG_S4: "16"
      AWG_H1: "471800590-471800690"
      AWG_H2: "1246894907-1246895000"
      AWG_H3: "923637689-923637780"
      AWG_H4: "1769581055-1869581055"
      AWG_I1: "<b 0xc700000001><rc 8><t><r 100>"
      AWG_I2: "<b 0xf6ab3267fa><t><rc 20><r 80>"
      AWG_I3: ""
      AWG_I4: ""
      AWG_I5: ""
      AWG_CLIENT_PERSISTENT_KEEPALIVE: "25"
    volumes:
      - ./awg/data:/etc/amnezia/amneziawg
      - ./awg/scripts:/opt/awg/scripts
    networks:
      - awg-net

  postgres:
    image: postgres:16-alpine
    container_name: amnezia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-amnezia_bot}
      POSTGRES_USER: ${POSTGRES_USER:-bot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password_change_me}
    volumes:
      - ./bot/data/db:/var/lib/postgresql/data
    networks:
      - awg-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bot_user} -d ${POSTGRES_DB:-amnezia_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: amnezia-bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      awg:
        condition: service_started
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      ADMIN_TELEGRAM_ID: ${ADMIN_TELEGRAM_ID}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-amnezia_bot}
      POSTGRES_USER: ${POSTGRES_USER:-bot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password_change_me}
      AWG_INTERFACE: awg0
      AWG_LISTEN_PORT: 5066
      AWG_SUBNET: 10.80.0.1/16
      AWG_DNS: 10.80.0.1
      AWG_CONTAINER_NAME: awg-core
      SCRIPTS_DIR: /app/scripts
      CONFIGS_DIR: /etc/amnezia/amneziawg/clients
      DEFAULT_RATE_LIMIT: ${DEFAULT_RATE_LIMIT:-15}
      EXPIRATION_DAYS: ${EXPIRATION_DAYS:-30}
      NOTIFICATION_DAYS: ${NOTIFICATION_DAYS:-3}
    volumes:
      - ./bot/src:/app/src
      - ./awg/scripts:/app/scripts:ro
      - ./awg/data:/etc/amnezia/amneziawg
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - awg-net

networks:
  awg-net:
    driver: bridge