# === Статика ===
location / {
    root /data/html;
    index vpn.html;
    try_files /vpn.html =404;
}

# === /novpn/ → 3x-ui ===
location ^~ /novpn/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://3x-ui:2053;
    proxy_redirect off;
}

location = /wg {
    return 301 /wg/;
}

location ^~ /wg/ {
    # Strip /wg prefix by using trailing slash in proxy_pass
    proxy_pass http://amnezia-wg-easy:51821/;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Accept-Encoding "";

    proxy_redirect ~^(/.*)$ /wg$1;
    proxy_cookie_path / /wg/;

    sub_filter_once off;
    sub_filter_types text/html text/css application/javascript;

    sub_filter 'href="/' 'href="/wg/';
    sub_filter 'src="/' 'src="/wg/';
    sub_filter 'action="/' 'action="/wg/';
    sub_filter 'fetch("/' 'fetch("/wg/';
    sub_filter '"/_nuxt/' '"/wg/_nuxt/';
    sub_filter '"/api/' '"/wg/api/';
}

# Preserve original HTTP method (POST/PUT/etc.) while forwarding top-level
# wg-easy routes back into /wg/. 302/301 can turn POST into GET.
location ^~ /api/ {
    return 307 /wg$request_uri;
}

location ^~ /setup/ {
    return 307 /wg$request_uri;
}

location ^~ /login {
    return 307 /wg$request_uri;
}

location ^~ /_nuxt/ {
    return 307 /wg$request_uri;
}