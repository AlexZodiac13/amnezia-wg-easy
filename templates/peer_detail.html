{% extends "base.html" %}
{% block content %}
<header class="topbar">
  <div>
    <div class="eyebrow">Peer detail</div>
    <h1>{{ peer.name }}</h1>
    <p class="muted">{{ peer.client_ip }} · endpoint {{ server_endpoint }}</p>
  </div>
  <a class="ghost" href="/">Назад</a>
</header>

<section class="panel-grid">
  <article class="panel qr-panel">
    <h2>QR</h2>
    <img class="qr-image" src="{{ qr_url }}" alt="QR code for peer configuration">
  </article>
  <article class="panel">
    <h2>Конфигурация</h2>
    <pre class="config-block">{{ config_text }}</pre>
  </article>
</section>
{% endblock %}
